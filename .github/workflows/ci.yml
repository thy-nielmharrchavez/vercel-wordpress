name: Auto Merge on Approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  check-approvals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for 2 Approvals and Merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Only proceed if the current review is an approval
          if [ "${{ github.event.review.state }}" != "approved" ]; then
            echo "Review is not an approval, skipping merge check"
            exit 0
          fi

          # Get the number of approved reviews
          APPROVALS=$(gh pr view "$PR_NUMBER" --json reviews --jq '[.reviews[] | select(.state == "APPROVED")] | length')
          
          echo "Found $APPROVALS approval(s)"
          
          # Merge if we have 2 or more approvals
          if [ "$APPROVALS" -ge 2 ]; then
            echo "✓ PR has 2+ approvals, merging..."
            gh pr merge "$PR_NUMBER" --merge --auto
            echo "✓ Merge scheduled"
          else
            echo "ℹ PR has $APPROVALS approval(s), need at least 2"
          fi
