name: Auto Merge & Deploy to Appwrite

on:
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request:
    types: [synchronize, reopened, closed]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
  APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
  APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
  APPWRITE_SITE_ID: ${{ secrets.APPWRITE_SITE_ID }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Count approvals, block on change-requests, trigger auto-merge
  # ─────────────────────────────────────────────────────────────────────────────
  check-approvals-and-merge:
    name: Check Approvals and Auto Merge
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.merged == false &&
      contains(github.event.pull_request.labels.*.name, 'ai-generated')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Count Approvals
        id: approvals
        run: |
          APPROVAL_COUNT=$(gh pr view ${{ github.event.pull_request.number }} \
            --json reviews \
            --jq '[.reviews[] | select(.state == "APPROVED")] | unique_by(.author.login) | length' \
            -R ${{ github.repository }})

          echo "total=$APPROVAL_COUNT" >> $GITHUB_OUTPUT
          echo "📊 Unique approvals: $APPROVAL_COUNT"

          if [ "$APPROVAL_COUNT" -ge 2 ]; then
            echo "approved=true" >> $GITHUB_OUTPUT
            echo "✅ Approval threshold met (2+)"
          else
            echo "approved=false" >> $GITHUB_OUTPUT
            echo "⏳ Waiting for more approvals ($APPROVAL_COUNT/2)"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for Blocking Reviews
        id: blocking
        run: |
          BLOCKING=$(gh pr view ${{ github.event.pull_request.number }} \
            --json reviews \
            --jq '[.reviews[] | select(.state == "CHANGES_REQUESTED")] | length' \
            -R ${{ github.repository }})

          echo "count=$BLOCKING" >> $GITHUB_OUTPUT

          if [ "$BLOCKING" -gt 0 ]; then
            echo "has_blocking=true" >> $GITHUB_OUTPUT
            echo "🚫 Blocking reviews present: $BLOCKING"
          else
            echo "has_blocking=false" >> $GITHUB_OUTPUT
            echo "✅ No blocking reviews"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable Auto Merge
        if: |
          steps.approvals.outputs.approved == 'true' &&
          steps.blocking.outputs.has_blocking == 'false'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto \
            --delete-branch \
            -R ${{ github.repository }} \
            || echo "ℹ️ Auto-merge already enabled or PR not ready"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment — Merge Status
        if: always()
        run: |
          APPROVED="${{ steps.approvals.outputs.approved }}"
          BLOCKING="${{ steps.blocking.outputs.has_blocking }}"
          COUNT="${{ steps.approvals.outputs.total }}"

          if [ "$APPROVED" == "true" ] && [ "$BLOCKING" == "false" ]; then
            MSG="✅ **Auto-merge enabled** — $COUNT/2 approvals, no blocking reviews. Will merge to \`main\` and trigger Appwrite deployment."
          elif [ "$BLOCKING" == "true" ]; then
            MSG="🚫 **Changes requested** — Auto-merge blocked until all change requests are resolved (${{ steps.blocking.outputs.count }} blocking)."
          else
            MSG="⏳ **Awaiting approvals** — $COUNT/2 received. One more approval will trigger auto-merge and Appwrite deploy."
          fi

          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$MSG" \
            -R ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy to Appwrite after merge
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-to-appwrite:
    name: Deploy to Appwrite
    if: |
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'ai-generated')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate required Appwrite secrets
        run: |
          if [ -z "${{ secrets.APPWRITE_ENDPOINT }}" ]; then echo "::error::Missing secret APPWRITE_ENDPOINT"; exit 1; fi
          if [ -z "${{ secrets.APPWRITE_PROJECT_ID }}" ]; then echo "::error::Missing secret APPWRITE_PROJECT_ID"; exit 1; fi
          if [ -z "${{ secrets.APPWRITE_API_KEY }}" ]; then echo "::error::Missing secret APPWRITE_API_KEY"; exit 1; fi
          if [ -z "${{ secrets.APPWRITE_SITE_ID }}" ]; then echo "::error::Missing secret APPWRITE_SITE_ID"; exit 1; fi

      - name: Install Appwrite CLI
        run: npm install -g appwrite-cli

      - name: Login to Appwrite
        run: |
          appwrite client \
            --endpoint "${{ secrets.APPWRITE_ENDPOINT }}" \
            --project-id "${{ secrets.APPWRITE_PROJECT_ID }}" \
            --key "${{ secrets.APPWRITE_API_KEY }}"

      - name: Build Site (optional)
        run: |
          npm ci || true
          npm run build || true

      - name: Validate build output
        run: |
          if [ ! -d public ]; then
            echo "::error::public/ directory not found. Ensure build outputs to public/ or generate static files before deploy.";
            ls -la || true
            exit 1
          fi
          if [ ! -f public/index.html ]; then
            echo "::warning::public/index.html not found. Deployment may serve an empty site.";
          fi

      - name: Deploy Appwrite Site
        id: deploy
        run: |
          DEPLOYMENT=$(appwrite sites createDeployment \
            --siteId "${{ secrets.APPWRITE_SITE_ID }}" \
            --activate true \
            --code "public" \
            --json)

          DEPLOYMENT_ID=$(echo "$DEPLOYMENT" | jq -r '.$id // "unknown"')
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "✅ Appwrite site deployment created: $DEPLOYMENT_ID"

      - name: Verify Site Deployment is Active
        run: |
          echo "⏳ Waiting for Appwrite to activate deployment..."
          sleep 10

          STATUS=$(curl -sf \
            -H "X-Appwrite-Project: ${{ secrets.APPWRITE_PROJECT_ID }}" \
            -H "X-Appwrite-Key: ${{ secrets.APPWRITE_API_KEY }}" \
            "${{ secrets.APPWRITE_ENDPOINT }}/v1/sites/${{ secrets.APPWRITE_SITE_ID }}/deployments/${{ steps.deploy.outputs.deployment_id }}" \
            | jq -r '.status // "unknown"')

          echo "📦 Deployment status: $STATUS"

          if [ "$STATUS" == "ready" ]; then
            echo "✅ Deployment is live"
          else
            echo "⚠️ Deployment status is '$STATUS' — check the Appwrite console for details"
          fi
        continue-on-error: true

      - name: Comment — Deployment Status on PR
        run: |
          CONSOLE_URL="${{ secrets.APPWRITE_ENDPOINT }}/console/project-${{ secrets.APPWRITE_PROJECT_ID }}/sites/site-${{ secrets.APPWRITE_SITE_ID }}"
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "🚀 **Deployed to Appwrite (Site)!**

          Deployment ID: \`${{ steps.deploy.outputs.deployment_id }}\`
          Monitor progress: [Appwrite Console]($CONSOLE_URL)" \
            -R ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Close Related Issue
        run: |
          ISSUE_NUMBER=$(echo "${{ github.event.pull_request.body }}" \
            | grep -oE '#[0-9]+' | head -1 | sed 's/#//')

          if [ -n "$ISSUE_NUMBER" ]; then
              gh issue close "$ISSUE_NUMBER" \
              --reason "completed" \
              --comment "🎉 Changes deployed to Appwrite (site deployment \`${{ steps.deploy.outputs.deployment_id }}\`). Closing automatically." \
              -R ${{ github.repository }} || true
            echo "✅ Issue #$ISSUE_NUMBER closed"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true